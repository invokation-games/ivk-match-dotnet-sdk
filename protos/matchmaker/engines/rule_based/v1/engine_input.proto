syntax = "proto3";
package matchmaker.engines.rule_based.v1;

// Engine input for rule-based. Encoded into Ticket.engine_input bytes.
message EngineInput {
  repeated Player players = 1;
  map<string, Attribute> attributes = 2;
}

message Attribute {
  repeated string value = 1;
  repeated string accepts = 2;
}

message Player {
  string player_id = 1;
  double mmr = 2;
  map<string, uint32> latencies = 3;
}
