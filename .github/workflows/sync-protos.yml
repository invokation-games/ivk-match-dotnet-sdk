name: Sync Protos

on:
  workflow_dispatch:
    inputs:
      ivk_protos_sha:
        description: "ivk-protos commit SHA to sync from (default: main HEAD)"
        required: false
        default: ""

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4

      - name: Checkout ivk-protos
        uses: actions/checkout@v4
        with:
          repository: invokation-games/ivk-protos
          ref: ${{ github.event.inputs.ivk_protos_sha || 'main' }}
          token: ${{ secrets.IVK_PROTOS_PAT }}
          path: ivk-protos

      - name: Resolve SHA
        id: sha
        run: |
          cd ivk-protos
          echo "sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Skip if already at this revision
        id: check
        run: |
          if [ -f protos/.proto-rev ] && [ "$(cat protos/.proto-rev | tr -d '[:space:]')" = "${{ steps.sha.outputs.sha }}" ]; then
            echo "Already at ${{ steps.sha.outputs.short }} — nothing to do."
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Vendor public proto subset
        if: steps.check.outputs.skip != 'true'
        run: |
          set -euo pipefail
          rm -rf protos/matchmaker
          PROTOS_SRC=ivk-protos/proto
          mkdir -p protos/matchmaker/core/v1

          # Required: matchmaker/core & matchmaker/outcomes
          cp $PROTOS_SRC/matchmaker/core/v1/*.proto protos/matchmaker/core/v1/
          cp $PROTOS_SRC/matchmaker/outcomes/v1/*.proto protos/matchmaker/outcomes/v1/

          # Engines: only those listed in manifest.json
          MANIFEST=$PROTOS_SRC/matchmaker/engines/manifest.json
          mkdir -p protos/matchmaker/engines
          for engine in $(jq -r '.engines[].id' $MANIFEST); do
            mkdir -p protos/matchmaker/engines/$engine/v1
            cp $PROTOS_SRC/matchmaker/engines/$engine/v1/*.proto protos/matchmaker/engines/$engine/v1/
          done
          cp $MANIFEST protos/matchmaker/engines/manifest.json

          # Record source revision
          echo "${{ steps.sha.outputs.sha }}" > protos/.proto-rev

          rm -rf ivk-protos

      - name: Open PR
        if: steps.check.outputs.skip != 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "feat: sync protos to ${{ steps.sha.outputs.short }}"
          title: "feat: sync protos to ivk-protos@${{ steps.sha.outputs.short }}"
          body: |
            Auto-generated proto sync from ivk-protos.
            Source SHA: ${{ steps.sha.outputs.sha }}
          # Fixed branch name (not SHA-suffixed) so rapid pushes to ivk-protos
          # collapse onto a single rolling PR. The action force-pushes new
          # content and updates the title/body to the latest source SHA.
          branch: chore/sync-protos
          delete-branch: true
